<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Inventario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { border: none; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .btn-primary { background-color: #7c3aed; border: none; }
        .btn-primary:hover { background-color: #6d28d9; }
        .brand-logo { color: #7c3aed; font-weight: bold; font-size: 1.5rem; text-align: center; margin-bottom: 1.5rem; }
    </style>
</head>
<body>

<div class="card p-4">
    <div class="brand-logo">📦 Sistema Inventario</div>
    <h5 class="text-center mb-4">Bienvenido de nuevo</h5>
    
    <form id="loginForm">
        <div class="mb-3">
            <label class="form-label">Correo electrónico</label>
            <input type="email" id="email" class="form-control" placeholder="usuario@correo.com" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Contraseña</label>
            <input type="password" id="password" class="form-control" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 mb-3">Ingresar</button>
        <div id="mensajeError" class="text-danger small text-center" style="display: none;"></div>
    </form>
    
    <hr>
    <p class="text-center small">¿No tienes cuenta? <a href="registro.html" style="color: #7c3aed;">Contáctanos</a></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/login.js"></script>
</body>
</html>
