<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Inventario</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
.bg-success{background:#7c3aed!important;}
.btn-success{background:#7c3aed!important;border-color:#7c3aed!important;}
</style>
</head>
<body>
<nav class="navbar navbar-dark bg-success">
<div class="container-fluid">
<span class="navbar-brand">Inventario</span>
<a href="index.html" class="btn btn-light btn-sm">Inicio</a>
</div>
</nav>

<div class="container mt-4">
    <input id="buscar" class="form-control mb-3" placeholder="Buscar producto...">
    <table class="table table-bordered text-center">
        <thead class="table-success text-white" style="background-color: #7c3aed;">
            <tr>
                <th>Código</th>
                <th>Producto</th>
                <th>Precio</th>
                <th>Stock</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="tablaProductos"></tbody>
    </table>
</div>

<div class="modal fade" id="modalEditar" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Editar Producto</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <label>Nombre:</label>
        <input type="text" id="editNombre" class="form-control mb-2">
        <label>Precio Venta:</label>
        <input type="number" id="editPrecio" class="form-control mb-2">
        <label>Stock:</label>
        <input type="number" id="editStock" class="form-control mb-2">
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
        <button type="button" class="btn btn-success" onclick="guardarCambios()">Guardar Cambios</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/inventario.js"></script>

</body>
</html>
