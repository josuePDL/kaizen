<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Inventario - KAIZEN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary-color: #7c3aed; }
        .bg-purple { background-color: var(--primary-color) !important; }
        .btn-purple { background-color: var(--primary-color) !important; border-color: var(--primary-color) !important; color: white; }
        .btn-purple:hover { background-color: #6d28d9 !important; color: white; }
        .table-header { background-color: var(--primary-color); color: white; }
        .stock-alerta { background-color: #fee2e2 !important; color: #dc2626; font-weight: bold; }

        @media (max-width: 768px) {
            .table-header { display: none; }
            .table, .table tbody, .table tr, .table td { display: block; width: 100%; }
            .table tr { margin-bottom: 15px; border: 1px solid #dee2e6; border-radius: 8px; padding: 10px; background: #fff; }
            .table td { text-align: right !important; padding-left: 50%; position: relative; border: none; border-bottom: 1px solid #eee; }
            .table td::before {
                content: attr(data-label);
                position: absolute;
                left: 10px;
                width: 45%;
                font-weight: bold;
                text-align: left;
                color: var(--primary-color);
            }
            .table td:last-child { border-bottom: 0; }
        }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-purple px-2 shadow-sm">
    <div class="container-fluid d-flex justify-content-between align-items-center">
        <span class="navbar-brand mb-0 h1 fs-5 fw-bold">📦 Inventario KAIZEN</span>
        <a href="index.html" class="btn btn-light btn-sm">Volver</a>
    </div>
</nav>

<div class="container mt-4">
    <div class="row g-3 mb-4">
        <div class="col-12 col-md-6">
            <label class="form-label fw-bold small text-muted text-uppercase">Buscar producto:</label>
            <input id="buscar" class="form-control" placeholder="Nombre o código...">
        </div>
        <div class="col-12 col-md-6">
            <label class="form-label fw-bold small text-muted text-uppercase">Categoría:</label>
            <select id="filtroClasificacion" class="form-select">
                <option value="todos">Todas las categorías</option>
            </select>
        </div>
    </div>

    <div class="table-responsive-md shadow-sm rounded bg-white">
        <table class="table table-hover align-middle text-center mb-0">
            <thead class="table-header">
                <tr>
                    <th>Código</th>
                    <th>Producto</th>
                    <th>Costo Unit.</th>
                    <th>Precio Venta</th>
                    <th>Stock</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tablaProductos"></tbody>
        </table>
    </div>

    <div class="row g-3 mt-4 mb-5">
        <div class="col-12 col-md-6">
            <div class="card shadow-sm border-0 h-100" style="border-left: 5px solid #6366f1;">
                <div class="card-body p-3">
                    <span class="text-muted small fw-bold text-uppercase">Costo Total Inventario (Inversión)</span>
                    <h2 class="mb-0 mt-2 fw-bold text-dark">Q <span id="totalCostoInv">0.00</span></h2>
                </div>
            </div>
        </div>
        <div class="col-12 col-md-6">
            <div class="card shadow-sm border-0 h-100" style="border-left: 5px solid #7c3aed;">
                <div class="card-body p-3">
                    <span class="text-muted small fw-bold text-uppercase">Valor Total Inventario (Ventas)</span>
                    <h2 class="mb-0 mt-2 fw-bold text-dark">Q <span id="totalVentaInv">0.00</span></h2>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalEditar" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0">
            <div class="modal-header bg-purple text-white">
                <h5 class="modal-title">Actualizar Producto</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="formEditar">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Nombre</label>
                        <input type="text" id="editNombre" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Costo (Q)</label>
                        <input type="number" step="0.01" id="editCosto" class="form-control" required>
                    </div>
                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label fw-bold">Precio Venta (Q)</label>
                            <input type="number" step="0.01" id="editPrecio" class="form-control" required>
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label fw-bold">Stock</label>
                            <input type="number" id="editStock" class="form-control" required>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-purple w-100" onclick="guardarCambios()">Guardar Cambios</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/inventario.js"></script>
</body>
</html>
