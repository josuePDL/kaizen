<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema - Ingreso de Productos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="cs/styles.css">
    
    <style>
        /* Paleta de Morados Personalizada */
        :root {
            --purple-primary: #7c3aed;
            --purple-hover: #6d28d9;
            --purple-light: #f5f3ff;
        }

        .bg-purple { background-color: var(--purple-primary) !important; }
        
        .btn-purple { 
            background-color: var(--purple-primary) !important; 
            color: white !important;
            border: none;
            transition: background 0.3s ease;
        }
        
        .btn-purple:hover { 
            background-color: var(--purple-hover) !important; 
            box-shadow: 0 4px 12px rgba(124, 58, 237, 0.2);
        }

        .text-purple { color: var(--purple-primary) !important; }

        /* Estilo de la tarjeta */
        .card-custom {
            border: none;
            border-radius: 12px;
            background-color: #ffffff;
        }

        .form-control:focus {
            border-color: var(--purple-primary);
            box-shadow: 0 0 0 0.25rem rgba(124, 58, 237, 0.25);
        }
    </style>
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-purple shadow-sm">
    <div class="container-fluid">
        <span class="navbar-brand fw-bold">Sistema de Gestión</span>
        
        <div class="d-flex gap-2 flex-wrap">
            <a href="busqueda.html" class="btn btn-outline-light btn-sm">Buscar</a>
            <a href="inventario.html" class="btn btn-outline-light btn-sm">Inventario</a>
            <a href="ventas.html" class="btn btn-outline-light btn-sm">Ventas</a>
            <a href="clasificaciones.html" class="btn btn-outline-light btn-sm">Clasificaciones</a>
            <a href="historial.html" class="btn btn-outline-light btn-sm">Historial</a>
            <a href="ingresos.html" class="btn btn-light btn-sm text-purple fw-bold">Ingreso productos</a>
            <button onclick="cerrarSesion()" class="btn btn-danger btn-sm">Salir</button>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            
            <div class="card card-custom p-4 shadow-lg">
                <div class="text-center mb-4">
                    <h3 class="fw-bold text-purple">Registrar Producto</h3>
                    <p class="text-muted small">Complete los datos para añadir stock al inventario</p>
                </div>

                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label small fw-bold">Información General</label>
                        <input id="codigo" class="form-control mb-2" placeholder="Código de barras (opcional)">
                        <input id="nombre" class="form-control" placeholder="Nombre completo del producto">
                    </div>

                    <div class="col-12">
                        <label class="form-label small fw-bold">Categoría</label>
                        <select id="clasificacion" class="form-select">
                            <option value="" disabled selected>Seleccione una clasificación...</option>
                            </select>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label small fw-bold">Stock</label>
                        <input id="cantidad" type="number" class="form-control" placeholder="Cant.">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label small fw-bold">Costo</label>
                        <div class="input-group">
                            <span class="input-group-text">$</span>
                            <input id="costo" type="number" step="0.01" class="form-control" placeholder="0.00">
                        </div>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label small fw-bold">Venta</label>
                        <div class="input-group">
                            <span class="input-group-text">$</span>
                            <input id="precio" type="number" step="0.01" class="form-control" placeholder="0.00">
                        </div>
                    </div>

                    <div class="col-12 mt-4">
                        <button id="btnGuardar" onclick="guardarIngreso()" class="btn btn-purple w-100 py-2 fw-bold">
                            Guardar Ingreso
                        </button>
                    </div>
                </div>
            </div> </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/ingresos.js"></script>
<script src="js/auth-session.js"></script>



</body>
</html>
