<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingresos - Sistema de Inventario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --main-purple: #7c3aed; }
        .bg-purple { background-color: var(--main-purple) !important; }
        .btn-purple { 
            background-color: var(--main-purple) !important; 
            border-color: var(--main-purple) !important;
            color: white !important;
        }
        .btn-purple:hover { filter: brightness(90%); }
        .card { border-radius: 12px; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-purple shadow-sm">
    <div class="container">
        <span class="navbar-brand fw-bold">Registro de Ingresos</span>
        <a href="index.html" class="btn btn-outline-light btn-sm">Volver al Inventario</a>
    </div>
</nav>

<div class="container mt-4 mb-5">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-8">
            <div class="card shadow-sm p-4">
                <h4 class="mb-4 text-secondary">Registrar Nuevo Producto</h4>
                
                <form id="formIngreso" class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label small fw-bold">Código (Opcional)</label>
                        <input id="codigo" class="form-control" placeholder="Ej: A001">
                    </div>
                    <div class="col-md-8">
                        <label class="form-label small fw-bold">Nombre del Producto *</label>
                        <input id="nombre" class="form-control" placeholder="Nombre completo" required>
                    </div>

                    <div class="col-12">
                        <label class="form-label small fw-bold">Clasificación / Categoría *</label>
                        <select id="clasificacion" class="form-select" required>
                            <option value="">Seleccione una categoría...</option>
                        </select>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label small fw-bold">Cantidad Inicial *</label>
                        <input id="cantidad" type="number" class="form-control" placeholder="0" required min="1">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label small fw-bold">Costo Compra (Q)</label>
                        <input id="costo" type="number" step="0.01" class="form-control" placeholder="0.00">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label small fw-bold">Precio Venta (Q)</label>
                        <input id="precio" type="number" step="0.01" class="form-control" placeholder="0.00">
                    </div>

                    <div class="col-12 mt-4">
                        <button type="button" id="btnGuardar" onclick="guardarIngreso()" class="btn btn-purple w-100 py-2 fw-bold text-uppercase">
                            Guardar Ingreso
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/ingresos.js"></script>
</body>
</html>
