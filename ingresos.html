<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ingresos</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
.bg-success{background:#7c3aed!important;}
.btn-success{background:#7c3aed!important;border-color:#7c3aed!important;}
</style>
</head>
<body>

<nav class="navbar navbar-dark bg-success">
<div class="container-fluid">
<span class="navbar-brand">Ingresos</span>
<a href="index.html" class="btn btn-light btn-sm">Inicio</a>
</div>
</nav>

<div class="container mt-4">

<div class="card shadow p-4">
<input id="codigo" class="form-control mb-2" placeholder="Código opcional">
<input id="nombre" class="form-control mb-2" placeholder="Nombre producto">

<select id="clasificacion" class="form-control mb-2"></select>

<input id="cantidad" type="number" class="form-control mb-2" placeholder="Cantidad">
<input id="costo" type="number" class="form-control mb-2" placeholder="Costo compra">
<input id="precio" type="number" class="form-control mb-2" placeholder="Precio venta">

<button onclick="guardarIngreso()" class="btn btn-success w-100">
Guardar Ingreso
</button>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/ingresos.js"></script>
</body>
</html>
