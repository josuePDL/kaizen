<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Sistema Púrpura</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="cs/styles.css">

    <style>
        /* Estilos específicos para el color morado en esta página */
        body {
            background-color: #f5f3ff; /* Un lila muy tenue de fondo */
            height: 100vh;
            display: flex;
            align-items: center;
        }
        .card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(124, 58, 237, 0.1);
        }
        .text-purple { color: #7c3aed !important; }
        .btn-purple { 
            background-color: #7c3aed !important; 
            color: white !important;
            border: none;
            padding: 12px;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .btn-purple:hover { 
            background-color: #6d28d9 !important; 
            transform: translateY(-2px);
        }
        .form-control:focus {
            border-color: #7c3aed;
            box-shadow: 0 0 0 0.25rem rgba(124, 58, 237, 0.25);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-11 col-sm-8 col-md-6 col-lg-4">
            
            <div class="card p-4 p-md-5">
                <div class="text-center mb-4">
                    <div class="d-inline-block bg-light p-3 rounded-circle mb-3">
                        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="#7c3aed" class="bi bi-person-lock" viewBox="0 0 16 16">
                            <path d="M11 5a3 3 0 1 1-6 0 3 3 0 0 1 6 0ZM8 7a2 2 0 1 0 0-4 2 2 0 0 0 0 4Zm0 5.996V14H1s0-1 2.216-2.635C4.41 10.53 6.13 10 8 10c.926 0 1.798.121 2.541.34m.387-1.04c.125.04.248.084.37.13-.122-.046-.245-.09-.37-.13ZM9 13a1 1 0 0 1 1-1v-1a2 2 0 1 1 4 0v1a1 1 0 0 1 1 1v2a1 1 0 0 1-1 1h-4a1 1 0 0 1-1-1v-2Zm3-3a1 1 0 0 0-1 1v1h2v-1a1 1 0 0 0-1-1Z"/>
                        </svg>
                    </div>
                    <h2 class="text-purple fw-bold">Bienvenido</h2>
                    <p class="text-muted">Ingresa tus credenciales</p>
                </div>

                <form id="loginForm">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Correo Electrónico</label>
                        <input type="email" id="email" class="form-control" placeholder="nombre@correo.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Contraseña</label>
                        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                    </div>
                    
                    <button type="submit" id="btnSubmit" class="btn btn-purple w-100 mt-3 shadow-sm">
                        Entrar al Sistema
                    </button>
                </form>

                <div id="mensaje" class="mt-4 alert alert-danger d-none py-2 small text-center"></div>
            </div>

            <p class="text-center mt-4 text-muted small">
                &copy; 2026 Mi Sistema de Inventario
            </p>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/login.js"></script>

</body>
</html>
