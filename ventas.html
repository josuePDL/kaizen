<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ventas - KAIZEN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary-color: #7c3aed; }
        .bg-purple { background: var(--primary-color) !important; }
        .btn-purple { background: var(--primary-color) !important; border-color: var(--primary-color) !important; color: white; }
        .btn-purple:hover { background: #6d28d9 !important; color: white; }
        
        @media (max-width: 576px) {
            .table-responsive-stack thead { display: none; }
            .table-responsive-stack tr { display: block; border: 1px solid #eee; margin-bottom: 1rem; border-radius: 8px; padding: 0.5rem; }
            .table-responsive-stack td { display: flex; justify-content: space-between; text-align: right; border: none; padding: 0.25rem 0.5rem; }
            .table-responsive-stack td::before { content: attr(data-label); font-weight: bold; color: var(--primary-color); }
        }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-purple px-2 shadow-sm">
    <div class="container-fluid">
        <span class="navbar-brand fw-bold">🛒 Nueva Venta</span>
        <a href="index.html" class="btn btn-light btn-sm">Inicio</a>
    </div>
</nav>

<div class="container mt-3">
    <div class="row g-3">
        <div class="col-12 col-lg-4">
            <div class="card p-3 shadow-sm border-0">
                <input id="nit" class="form-control mb-2" placeholder="NIT (C/F)">
                <input id="cliente" class="form-control" placeholder="Nombre Cliente">
            </div>
        </div>
        <div class="col-12 col-lg-8">
            <div class="card p-3 shadow-sm border-0">
                <div class="row g-2">
                    <div class="col-8">
                        <input id="codigo" class="form-control" placeholder="Código de Producto">
                    </div>
                    <div class="col-4">
                        <input id="cantidad" type="number" class="form-control" value="1" min="1">
                    </div>
                    <div class="col-12">
                        <button onclick="agregarProducto()" class="btn btn-purple w-100">Agregar al Carrito</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="card mt-3 shadow-sm border-0">
        <div class="table-responsive">
            <table class="table table-hover table-responsive-stack mb-0">
                <thead class="bg-light">
                    <tr>
                        <th>Producto</th>
                        <th>Precio</th>
                        <th>Cant.</th>
                        <th>Subtotal</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="tablaVenta"></tbody>
            </table>
        </div>
    </div>

    <div class="row mt-3 mb-5">
        <div class="col-12 col-md-6">
            <h3>Total: Q<span id="total">0.00</span></h3>
        </div>
        <div class="col-12 col-md-6">
            <button onclick="finalizarVenta()" class="btn btn-purple btn-lg w-100">Finalizar Venta</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
<script src="js/ventas.js"></script>
</body>
</html>
