<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ventas</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
.bg-success{background:#7c3aed!important;}
.btn-success{background:#7c3aed!important;border-color:#7c3aed!important;}
</style>
</head>
<body>

<nav class="navbar navbar-dark bg-success">
<div class="container-fluid">
<span class="navbar-brand">Ventas</span>
<a href="index.html" class="btn btn-light btn-sm">Inicio</a>
</div>
</nav>

<div class="container mt-4">

<div class="card p-3 mb-3">
<input id="nit" class="form-control mb-2" placeholder="NIT">
<input id="cliente" class="form-control" placeholder="Nombre Cliente">
</div>

<div class="card p-3 mb-3">
<input id="codigo" class="form-control mb-2" placeholder="Código Producto">
<input id="cantidad" type="number" class="form-control mb-2" placeholder="Cantidad">
<button onclick="agregarProducto()" class="btn btn-success">Agregar</button>
</div>

<table class="table table-bordered text-center">
<thead class="table-success">
<tr>
<th>Producto</th>
<th>Precio</th>
<th>Cantidad</th>
<th>Subtotal</th>
</tr>
</thead>
<tbody id="tablaVenta"></tbody>
</table>

<h4>Total: Q<span id="total">0</span></h4>

<button onclick="finalizarVenta()" class="btn btn-success w-100">
Finalizar Venta
</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="js/ventas.js"></script>
</body>
</html>
