<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ventas - Punto de Venta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary-color: #7c3aed; }
        .bg-purple { background: var(--primary-color) !important; }
        .btn-purple { background: var(--primary-color) !important; border-color: var(--primary-color) !important; color: white; }
        .btn-purple:hover { background: #6d28d9 !important; color: white; }
        
        /* Ajustes de UI */
        .card { border-radius: 12px; border: none; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .table-purple { background-color: var(--primary-color); color: white; }

        /* Tabla Responsiva tipo "Ticket" en móvil */
        @media (max-width: 576px) {
            .table-responsive-stack thead { display: none; }
            .table-responsive-stack tr { 
                display: block; 
                border: 1px solid #eee; 
                margin-bottom: 1rem; 
                border-radius: 8px;
                padding: 0.5rem;
            }
            .table-responsive-stack td { 
                display: flex; 
                justify-content: space-between; 
                text-align: right; 
                border: none;
                padding: 0.25rem 0.5rem;
            }
            .table-responsive-stack td::before {
                content: attr(data-label);
                font-weight: bold;
                color: var(--primary-color);
                text-align: left;
            }
            .total-section { text-align: center !important; font-size: 1.5rem; }
        }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-purple px-2">
    <div class="container-fluid">
        <span class="navbar-brand fw-bold">🛒 Nueva Venta</span>
        <a href="index.html" class="btn btn-light btn-sm">Inicio</a>
    </div>
</nav>

<div class="container mt-3">
    <div class="row g-3">
        <div class="col-12 col-lg-4">
            <div class="card p-3 h-100">
                <h6 class="fw-bold mb-3">Datos del Cliente</h6>
                <div class="row g-2">
                    <div class="col-12">
                        <input id="nit" class="form-control" placeholder="NIT / CF">
                    </div>
                    <div class="col-12">
                        <input id="cliente" class="form-control" placeholder="Nombre completo">
                    </div>
                </div>
            </div>
        </div>

        <div class="col-12 col-lg-8">
            <div class="card p-3 h-100">
                <h6 class="fw-bold mb-3">Agregar Productos</h6>
                <div class="row g-2">
                    <div class="col-12 col-sm-6">
                        <input id="codigo" class="form-control" placeholder="Código de barras o ID">
                    </div>
                    <div class="col-7 col-sm-3">
                        <input id="cantidad" type="number" class="form-control" placeholder="Cant." value="1">
                    </div>
                    <div class="col-5 col-sm-3">
                        <button onclick="agregarProducto()" class="btn btn-purple w-100">
                            <i class="bi bi-plus-lg"></i> Agregar
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="card mt-3">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover table-responsive-stack mb-0">
                    <thead class="table-purple">
                        <tr>
                            <th>Producto</th>
                            <th>Precio</th>
                            <th>Cantidad</th>
                            <th>Subtotal</th>
                        </tr>
                    </thead>
                    <tbody id="tablaVenta">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="row mt-3 mb-5 align-items-center">
        <div class="col-12 col-md-6 total-section">
            <h3 class="fw-bold">Total: <span class="text-purple">Q<span id="total">0.00</span></span></h3>
        </div>
        <div class="col-12 col-md-6">
            <button onclick="finalizarVenta()" class="btn btn-purple btn-lg w-100 shadow">
                Finalizar y Generar Factura
            </button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="js/ventas.js"></script>
</body>
</html>
