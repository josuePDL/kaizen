<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Búsqueda de Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary-color: #7c3aed; }
        .bg-purple { background: var(--primary-color) !important; }
        .btn-purple { background: var(--primary-color) !important; border-color: var(--primary-color) !important; color: white; }
        .btn-purple:hover { background: #6d28d9 !important; color: white; }
        
        /* Ajuste para que la tarjeta se vea bien en cualquier pantalla */
        .search-card {
            width: 100%;
            max-width: 500px; /* Un poco más ancho para tablets */
            border: none;
            border-radius: 16px;
        }

        /* Estilo para los resultados de búsqueda */
        #resultado .card {
            border-left: 5px solid var(--primary-color);
            background: #fdfbff;
        }

        /* Animación simple para que el resultado "aparezca" */
        #resultado {
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-purple px-2 shadow-sm">
    <div class="container-fluid">
        <span class="navbar-brand fw-bold">🔍 Consultor</span>
        <a href="index.html" class="btn btn-light btn-sm shadow-sm">Inicio</a>
    </div>
</nav>

<div class="container mt-4 mt-md-5">
    
    <div class="card p-4 shadow-sm mx-auto search-card">
        <h5 class="text-center fw-bold mb-4">Consultar Producto</h5>
        
        <div class="mb-3">
            <label for="codigo" class="form-label small fw-bold text-muted">Escanea o escribe el código:</label>
            <input id="codigo" 
                   class="form-control form-control-lg text-center" 
                   placeholder="Ej: DC001"
                   inputmode="text"> </div>

        <button onclick="buscarProducto()" class="btn btn-purple btn-lg w-100 shadow-sm py-3">
            <i class="bi bi-search"></i> Buscar Ahora
        </button>

        <div id="resultado" class="mt-4">
            </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/busqueda.js"></script>
</body>
</html>
