<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clasificaciones</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary-color: #7c3aed; }
        .bg-purple { background: var(--primary-color) !important; }
        .btn-purple { background: var(--primary-color) !important; border-color: var(--primary-color) !important; color: white; }
        .btn-purple:hover { background: #6d28d9 !important; color: white; }
        
        /* Estilos de tabla responsiva */
        @media (max-width: 576px) {
            .table-responsive-stack thead { display: none; }
            .table-responsive-stack tr { 
                display: block; 
                border: 1px solid #dee2e6; 
                margin-bottom: 1rem; 
                border-radius: 10px;
                padding: 0.5rem;
                background: #fff;
            }
            .table-responsive-stack td { 
                display: flex; 
                justify-content: space-between; 
                align-items: center;
                text-align: right; 
                border: none;
                padding: 0.5rem;
                border-bottom: 1px solid #f8f9fa;
            }
            .table-responsive-stack td:last-child { border-bottom: none; }
            .table-responsive-stack td::before {
                content: attr(data-label);
                font-weight: bold;
                color: var(--primary-color);
                text-align: left;
            }
        }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-purple px-2">
    <div class="container-fluid">
        <span class="navbar-brand fw-bold">🏷️ Categorías</span>
        <a href="index.html" class="btn btn-light btn-sm">Inicio</a>
    </div>
</nav>

<div class="container mt-4">

    <div class="card p-4 shadow-sm border-0 mb-4">
        <h6 class="fw-bold mb-3 text-muted">Nueva Clasificación</h6>
        <div class="row g-3">
            <div class="col-12 col-md-5">
                <label class="form-label small fw-bold">Nombre de Categoría</label>
                <input id="nombre" class="form-control" placeholder="Ej: Electrónica">
            </div>
            <div class="col-12 col-md-3">
                <label class="form-label small fw-bold">Prefijo</label>
                <input id="prefijo" class="form-control" placeholder="Ej: ELEC">
            </div>
            <div class="col-12 col-md-4 d-flex align-items-end">
                <button onclick="guardarClasificacion()" class="btn btn-purple w-100 shadow-sm">
                    <i class="bi bi-save"></i> Guardar Clasificación
                </button>
            </div>
        </div>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover table-responsive-stack mb-0 text-center align-middle">
                    <thead class="bg-light text-muted">
                        <tr>
                            <th class="py-3">Nombre</th>
                            <th class="py-3">Prefijo</th>
                            <th class="py-3">Acción</th>
                        </tr>
                    </thead>
                    <tbody id="tablaClasificaciones">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/clasificaciones.js"></script>
</body>
</html>
