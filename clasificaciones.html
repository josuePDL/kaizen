<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Clasificaciones</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
.bg-success{background:#7c3aed!important;}
.btn-success{background:#7c3aed!important;border-color:#7c3aed!important;}
</style>
</head>
<body>

<nav class="navbar navbar-dark bg-success">
<div class="container-fluid">
<span class="navbar-brand">Clasificaciones</span>
<a href="index.html" class="btn btn-light btn-sm">Inicio</a>
</div>
</nav>

<div class="container mt-4">

<div class="card p-4 shadow mb-4">
<input id="nombre" class="form-control mb-2" placeholder="Nombre">
<input id="prefijo" class="form-control mb-2" placeholder="Prefijo">

<button onclick="guardarClasificacion()" class="btn btn-success">
Guardar
</button>
</div>

<table class="table table-bordered text-center">
<thead class="table-success">
<tr>
<th>Nombre</th>
<th>Prefijo</th>
<th>Acción</th>
</tr>
</thead>
<tbody id="tablaClasificaciones"></tbody>
</table>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/clasificaciones.js"></script>
</body>
</html>
