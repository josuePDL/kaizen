<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clasificaciones | Sistema</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="cs/styles.css">
    
    <style>
        .bg-purple { background-color: #7c3aed !important; }
        .btn-purple { 
            background-color: #7c3aed !important; 
            color: white !important;
            border: none;
        }
        .btn-purple:hover { background-color: #6d28d9 !important; }
        .text-purple { color: #7c3aed !important; }
        
        /* Ajuste para que la tabla no se vea apretada en móviles */
        .table-responsive {
            border-radius: 8px;
            overflow: hidden;
        }
    </style>
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-purple shadow-sm">
    <div class="container-fluid">
        <span class="navbar-brand fw-bold">Sistema</span>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        
        <div class="collapse navbar-collapse" id="navbarNav">
            <div class="navbar-nav ms-auto gap-2 py-2 py-lg-0">
                <a href="busqueda.html" class="btn btn-outline-light btn-sm">Buscar</a>
                <a href="inventario.html" class="btn btn-outline-light btn-sm">Inventario</a>
                <a href="ventas.html" class="btn btn-outline-light btn-sm">Ventas</a>
                <a href="clasificaciones.html" class="btn btn-outline-light btn-sm active">Clasificaciones</a>
                <a href="historial.html" class="btn btn-outline-light btn-sm">Historial</a>
                <a href="ingresos.html" class="btn btn-outline-light btn-sm">Ingreso productos</a>
                <button onclick="cerrarSesion()" class="btn btn-danger btn-sm">Salir</button>
            </div>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <div class="card p-4 shadow-sm border-0 mb-4">
        <h5 class="text-purple fw-bold mb-3">Nueva Clasificación</h5>
        <div class="row g-2">
            <div class="col-12 col-md-5">
                <input id="nombre" class="form-control" placeholder="Nombre (Ej: Maquillaje)">
            </div>
            <div class="col-12 col-md-4">
                <input id="prefijo" class="form-control" placeholder="Prefijo (Ej: MQ)">
            </div>
            <div class="col-12 col-md-3">
                <button onclick="guardarClasificacion()" class="btn btn-success w-100">
                    <i class="bi bi-save"></i> Guardar
                </button>
            </div>
        </div>
    </div>

    <div class="card shadow-sm border-0">
        <div class="table-responsive">
            <table class="table table-hover align-middle text-center mb-0">
                <thead class="table-light">
                    <tr class="text-purple">
                        <th>Nombre</th>
                        <th>Prefijo</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaClasificaciones">
                    </tbody>
            </table>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/auth-session.js"></script>
<script src="js/clasificaciones.js"></script>

</body>
</html>
